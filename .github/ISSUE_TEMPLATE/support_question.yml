name: Support / Question
description: Ask a usage question or request help integrating the Ecolet PHP SDK
title: "[Support]: "
labels:
  - question
body:
  - type: markdown
    attributes:
      value: |
        Use this template for usage questions, integration help, or clarification requests.

        For bugs, use the bug report template. For new capabilities, use the feature request template.
  - type: textarea
    id: question
    attributes:
      label: Question
      description: What do you need help with?
      placeholder: Describe the problem, confusion, or usage question.
    validations:
      required: true
  - type: textarea
    id: goal
    attributes:
      label: What are you trying to achieve?
      description: Explain the integration goal or workflow you are implementing.
      placeholder: I am trying to authenticate and then fetch available services for...
    validations:
      required: true
  - type: textarea
    id: code-sample
    attributes:
      label: Current code
      description: Paste the relevant code you are using, if applicable.
      render: php
  - type: input
    id: sdk-version
    attributes:
      label: SDK version
      placeholder: e.g. 1.0.0
    validations:
      required: true
  - type: input
    id: php-version
    attributes:
      label: PHP version
      placeholder: e.g. 8.3.6
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Related area
      options:
        - Authentication
        - Users
        - Services
        - Locations
        - Map points
        - Orders
        - Orders to send
        - Add Parcel
        - HTTP client / transport
        - DTOs / collections
        - Testing
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: attempted
    attributes:
      label: What have you tried?
      description: Include relevant docs, code changes, or approaches you already tried.
  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Add anything else that would help answer the question.

*** Add File: /home/moiryi/dev/ecolet-php-sdk/.github/ISSUE_TEMPLATE/config.yml
blank_issues_enabled: false
contact_links:
  - name: Documentation
    url: https://github.com/daika7ana/ecolet-php-sdk#readme
    about: Check the README and package documentation before opening a support request.